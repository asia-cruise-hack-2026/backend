# TAMRA PASS — 단일 VM host nginx: 웹(정적)과 API(프록시)를 한 서버가 함께 서빙
# 설치: /etc/nginx/sites-available/tamrapass 로 복사 → sites-enabled 심볼릭 → certbot --nginx 로 TLS
server {
    listen 80;
    server_name _;                 # 도메인이 있으면 교체 (예: tamrapass.example.com)
    client_max_body_size 10m;

    # --- API → 백엔드 컨테이너(루프백) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 웹 → 프론트 정적 빌드(SPA) ---
    root /var/www/tamrapass;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
